<svg width="720" height="180" viewBox="0 0 720 180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Connect with Saanika Patil</title>
<desc>Vintage typewriter styled connect section with LinkedIn and GitHub links</desc>
<defs>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Elite&amp;display=swap');
    .bg { fill: #ffffff; }
    .border-outer { fill: none; stroke: #2a2a2a; stroke-width: 2.5; }
    .border-inner { fill: none; stroke: #2a2a2a; stroke-width: 0.8; stroke-dasharray: 4 3; }
    .heading { font-family: 'Special Elite', 'Courier New', monospace; font-size: 22px; fill: #1a1a1a; letter-spacing: 3px; }
    .subtext { font-family: 'Courier New', monospace; font-size: 11px; fill: #555; letter-spacing: 1.5px; }
    .label { font-family: 'Courier New', monospace; font-size: 12px; fill: #1a1a1a; font-weight: bold; letter-spacing: 2px; }
    .name  { font-family: 'Courier New', monospace; font-size: 12px; fill: #1a1a1a; letter-spacing: 1px; }
    .key-bg { fill: #fff; stroke: #1a1a1a; stroke-width: 1.6; }
    .key-shadow { fill: #d4cfc8; stroke: none; }
    .key-inner { fill: none; stroke: #1a1a1a; stroke-width: 0.7; }
    .divider { stroke: #2a2a2a; stroke-width: 1; stroke-dasharray: 2 3; }
    .bracket { font-family: 'Courier New', monospace; font-size: 18px; fill: #999; }
    .underline { stroke: #1a1a1a; stroke-width: 1; }
    @keyframes pressLi { 0%,100%{transform:translateY(0)} 10%{transform:translateY(3px)} 20%{transform:translateY(0)} }
    @keyframes pressGh { 0%,100%{transform:translateY(0)} 55%{transform:translateY(3px)} 65%{transform:translateY(0)} }
    #key-li { animation: pressLi 4s ease infinite; transform-origin: center; transform-box: fill-box; }
    #key-gh { animation: pressGh 4s ease infinite; transform-origin: center; transform-box: fill-box; }
  </style>
</defs>

<!-- Background -->
<rect width="720" height="180" rx="6" class="bg"/>

<!-- Outer border -->
<rect x="10" y="10" width="700" height="160" rx="4" class="border-outer"/>
<!-- Inner dashed border -->
<rect x="18" y="18" width="684" height="144" rx="3" class="border-inner"/>

<!-- Corner ornaments -->
<text x="22" y="36" class="bracket">+</text>
<text x="686" y="36" class="bracket">+</text>
<text x="22" y="158" class="bracket">+</text>
<text x="686" y="158" class="bracket">+</text>

<!-- Section heading -->
<text x="360" y="52" text-anchor="middle" class="heading">-- FIND ME HERE --</text>
<!-- Underline -->
<line x1="220" y1="58" x2="500" y2="58" class="underline"/>

<!-- Subtext -->
<text x="360" y="74" text-anchor="middle" class="subtext">[ press a key to connect ]</text>

<!-- ===== LINKEDIN KEY ===== -->
<a href="https://www.linkedin.com/in/saanikapatil/" target="_blank">
  <g id="key-li">
    <!-- Key shadow -->
    <rect x="153" y="103" width="174" height="52" rx="8" class="key-shadow"/>
    <!-- Key body -->
    <rect x="150" y="98" width="174" height="52" rx="8" class="key-bg"/>
    <!-- Key inner ring -->
    <rect x="156" y="104" width="162" height="40" rx="5" class="key-inner"/>
    <!-- LinkedIn logo lines (simplified L shape) -->
    <rect x="166" y="112" width="4" height="16" fill="#1a1a1a"/>
    <rect x="166" y="124" width="10" height="4" fill="#1a1a1a"/>
    <rect x="174" y="112" width="4" height="4" fill="#1a1a1a"/>
    <rect x="174" y="118" width="4" height="14" fill="#1a1a1a"/>
    <rect x="180" y="118" width="8" height="14" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <!-- Label -->
    <text x="237" y="123" text-anchor="middle" class="label">LINKEDIN</text>
    <text x="237" y="138" text-anchor="middle" class="name">Saanika Patil</text>
  </g>
</a>

<!-- Center ornament -->
<text x="360" y="133" text-anchor="middle" font-family="Courier New" font-size="16" fill="#aaa">&#9670;</text>

<!-- ===== GITHUB KEY ===== -->
<a href="https://github.com/saanikapatil08" target="_blank">
  <g id="key-gh">
    <!-- Key shadow -->
    <rect x="393" y="103" width="174" height="52" rx="8" class="key-shadow"/>
    <!-- Key body -->
    <rect x="390" y="98" width="174" height="52" rx="8" class="key-bg"/>
    <!-- Key inner ring -->
    <rect x="396" y="104" width="162" height="40" rx="5" class="key-inner"/>
    <!-- GitHub octocat simplified (circle head + body arc) -->
    <circle cx="406" cy="120" r="7" fill="none" stroke="#1a1a1a" stroke-width="1.4"/>
    <path d="M400,124 Q400,132 406,132 Q412,132 412,124" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="403" y1="131" x2="400" y2="135" stroke="#1a1a1a" stroke-width="1.2"/>
    <line x1="409" y1="131" x2="412" y2="135" stroke="#1a1a1a" stroke-width="1.2"/>
    <!-- Label -->
    <text x="477" y="123" text-anchor="middle" class="label">GITHUB</text>
    <text x="477" y="138" text-anchor="middle" class="name">saanikapatil08</text>
  </g>
</a>

<!-- Bottom typewriter rule -->
<text x="360" y="168" text-anchor="middle" font-family="Courier New" font-size="9" fill="#bbb" letter-spacing="4">. . . . . . . . . . . . . . . . . . . . . . . .</text>

</svg>
