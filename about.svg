<svg width="720" height="200" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>About Saanika Patil</title>
<desc>Vintage typewriter styled about me section</desc>
<defs>
  <style>
    .bg { fill: #ffffff; }
    .border-outer { fill: none; stroke: #2a2a2a; stroke-width: 2.5; }
    .border-inner { fill: none; stroke: #2a2a2a; stroke-width: 0.8; stroke-dasharray: 4 3; }
    .section-label { font-family: 'Courier New', Courier, monospace; font-size: 11px; fill: #888; letter-spacing: 5px; }
    .heading { font-family: 'Courier New', Courier, monospace; font-size: 18px; font-weight: 700; fill: #1a1a1a; letter-spacing: 3px; }
    .body-text { font-family: 'Courier New', Courier, monospace; font-size: 12.5px; fill: #333; letter-spacing: 0.8px; line-height: 1.8; }
    .rule { stroke: #2a2a2a; stroke-width: 1; }
    .rule-light { stroke: #ccc; stroke-width: 0.6; stroke-dasharray: 2 4; }
    .corner { font-family: 'Courier New', monospace; font-size: 14px; fill: #999; }
    .tab-mark { font-family: 'Courier New', monospace; font-size: 10px; fill: #bbb; }
  </style>
</defs>
<rect width="720" height="200" rx="6" class="bg"/>
<rect x="10" y="10" width="700" height="180" rx="4" class="border-outer"/>
<rect x="18" y="18" width="684" height="164" rx="3" class="border-inner"/>
<text x="22" y="34" class="corner">+</text>
<text x="692" y="34" class="corner">+</text>
<text x="22" y="192" class="corner">+</text>
<text x="692" y="192" class="corner">+</text>
<text x="360" y="42" text-anchor="middle" class="section-label">[ ABOUT ME ]</text>
<line x1="40" y1="48" x2="680" y2="48" class="rule"/>
<line x1="40" y1="64" x2="680" y2="64" class="rule-light"/>
<line x1="40" y1="84" x2="680" y2="84" class="rule-light"/>
<line x1="40" y1="104" x2="680" y2="104" class="rule-light"/>
<line x1="40" y1="124" x2="680" y2="124" class="rule-light"/>
<line x1="40" y1="144" x2="680" y2="144" class="rule-light"/>
<line x1="40" y1="164" x2="680" y2="164" class="rule-light"/>
<text x="60" y="70" class="body-text">Hello!  I am  Saanika  Patil  --  a  Data  Scientist  and  AI / ML  enthusiast</text>
<text x="60" y="90" class="body-text">passionate  about  turning  raw  data  into  meaningful  insights.</text>
<text x="60" y="118" class="body-text">I  love  building  intelligent  systems,  exploring  deep  learning,  and</text>
<text x="60" y="138" class="body-text">working  at  the  intersection  of  mathematics  and  machines.</text>
<text x="60" y="162" class="tab-mark">&#9;</text>
<text x="360" y="185" text-anchor="middle" font-family="Courier New" font-size="9" fill="#bbb" letter-spacing="4">. . . . . . . . . . . . . . . . . . . . . . . . . . . . .</text>
